<title>pelud1n — seguridad ofensiva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Saira+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,800;1,900&family=Saira:wght@400;500;600;700&family=VT323&family=JetBrains+Mono:wght@400;500;700&display=swap');
/* ============================================================
   pelud1n — COLOR TOKENS  ·  DEDSEC-style rework
   Black + bone + muted blood red. Solid, dark, 1-bit, NO neon.
   Desaturated olive + bruise-purple are GLITCH accents only.

   Token NAMES are preserved from the previous system on purpose:
   old --mint/--violet/--slate/--glow references are remapped at the
   bottom so the whole kit recolors automatically (mint→blood,
   violet→bruise, glows→off). Author NEW work against the named
   tokens below (--blood, --bone, --ink, --toxic, --bruise).
   ============================================================ */
:root {
  /* ---- INK — neutral, faintly-warm near-black ramp ----------- */
  --ink-1000: #050506;
  --ink-950:  #0A0A0B;   /* app background            */
  --ink-900:  #0F0F11;   /* elevated background       */
  --ink-850:  #141416;   /* surface / card            */
  --ink-800:  #1B1B1E;   /* surface hover             */
  --ink-750:  #232327;   /* surface active / inset    */
  --ink-700:  #2D2D32;   /* hairline strong           */
  --ink-600:  #3B3B42;   /* divider strong            */
  --ink-500:  #4F4F58;   /* disabled stroke           */
  --ink-400:  #6B6B75;   /* text tertiary / icon dim  */
  --ink-300:  #8A8A94;

  /* ---- BONE — warm off-white (the "white" of the 1-bit art) -- */
  --bone-050: #ECE7DB;   /* primary text              */
  --bone-100: #D9D3C5;
  --bone-200: #B7B1A1;
  --bone-300: #8F897B;   /* secondary text            */
  --bone-400: #6C6759;   /* tertiary text             */
  --bone-pure:#F4F1E9;   /* max-contrast highlight    */

  /* ---- BLOOD — primary signal (muted, solid, not neon) ------- */
  --blood-bright: #D8333F;   /* hover / active edge   */
  --blood:        #B5202C;   /* base accent           */
  --blood-deep:   #7C1620;   /* pressed / shadow       */
  --blood-dark:   #4E0E15;   /* deepest fill           */
  --blood-soft:   rgba(181, 32, 44, 0.16);
  --blood-line:   rgba(181, 32, 44, 0.55);

  /* ---- Glitch accents — DESATURATED, used sparingly ---------- */
  --toxic:      #7E8A55;     /* dithered olive / sage  */
  --toxic-soft: rgba(126, 138, 85, 0.16);
  --toxic-line: rgba(126, 138, 85, 0.5);
  --bruise:      #6E5F84;    /* muted purple           */
  --bruise-soft: rgba(110, 95, 132, 0.18);
  --bruise-line: rgba(110, 95, 132, 0.5);
  --rust:    #B5532A;        /* high severity          */
  --mustard: #C49A3C;        /* medium severity        */

  /* ============================================================
     SEMANTIC ALIASES — reference these in product code.
     ============================================================ */
  --color-bg:            var(--ink-950);
  --color-bg-elevated:   var(--ink-900);
  --color-surface:       var(--ink-850);
  --color-surface-hover: var(--ink-800);
  --color-surface-active:var(--ink-750);
  --color-surface-inset: var(--ink-1000);

  --color-text:          var(--bone-050);
  --color-text-secondary:var(--bone-300);
  --color-text-tertiary: var(--bone-400);
  --color-text-disabled: var(--ink-500);
  --color-text-on-accent:var(--bone-pure);   /* on blood fill */
  --color-text-on-bone:  var(--ink-1000);    /* on bone fill  */

  --color-border:        rgba(236, 231, 219, 0.12);
  --color-border-strong: rgba(236, 231, 219, 0.22);
  --color-border-faint:  rgba(236, 231, 219, 0.06);

  --color-accent:        var(--blood);
  --color-accent-hover:  var(--blood-bright);
  --color-accent-press:  var(--blood-deep);
  --color-accent-2:      var(--bone-050);     /* bone = high-contrast 2nd accent */
  --color-danger:        var(--blood-bright);

  --color-link:          var(--blood-bright);
  --color-link-hover:    var(--bone-pure);

  --color-selection:     rgba(181, 32, 44, 0.42);
  --color-focus:         var(--blood-bright);

  /* ---- Severity / status (gritty, muted) -------------------- */
  --sev-critical: var(--blood-bright);
  --sev-high:     var(--rust);
  --sev-medium:   var(--mustard);
  --sev-low:      var(--toxic);
  --sev-info:     var(--bruise);
  --sev-critical-soft: var(--blood-soft);
  --sev-high-soft:     rgba(181, 83, 42, 0.16);
  --sev-medium-soft:   rgba(196, 154, 60, 0.16);
  --sev-low-soft:      var(--toxic-soft);
  --sev-info-soft:     var(--bruise-soft);

  /* ============================================================
     BACKWARD-COMPAT REMAPS — keep old files on-palette.
     (mint → blood, violet → bruise, slate → ink, glows → off)
     ============================================================ */
  --slate-1000: var(--ink-1000); --slate-950: var(--ink-950); --slate-900: var(--ink-900);
  --slate-850: var(--ink-850);  --slate-800: var(--ink-800); --slate-750: var(--ink-750);
  --slate-700: var(--ink-700);  --slate-600: var(--ink-600); --slate-500: var(--ink-500);
  --slate-400: var(--ink-400);  --slate-300: var(--bone-300); --slate-200: var(--bone-200);
  --slate-100: var(--bone-100); --slate-050: var(--bone-050);

  --mint-bright: var(--blood-bright); --mint: var(--blood); --mint-deep: var(--blood-deep);
  --mint-soft: var(--blood-soft); --mint-line: var(--blood-line); --mint-glow: transparent;

  --violet-bright: #8A79A0; --violet: var(--bruise); --violet-deep: #574A68;
  --violet-soft: var(--bruise-soft); --violet-line: var(--bruise-line); --violet-glow: transparent;

  --red-bright: var(--blood-bright); --red: var(--blood); --red-deep: var(--blood-deep);
  --red-soft: var(--blood-soft); --red-line: var(--blood-line); --red-glow: transparent;
}

/* ============================================================
   pelud1n — TYPOGRAPHY TOKENS  ·  DEDSEC-style rework
   Pixel voice (Silkscreen) + condensed slogans (Saira Condensed)
   + BBS terminal (VT323) + mono (JetBrains) + body (Saira).
   ============================================================ */
:root {
  /* ---- Families ---------------------------------------------- */
  --font-pixel:    'Silkscreen', 'JetBrains Mono', ui-monospace, monospace;
  --font-display:  'Saira Condensed', 'Arial Narrow', system-ui, sans-serif;
  --font-terminal: 'VT323', 'JetBrains Mono', ui-monospace, monospace;
  --font-mono:     'JetBrains Mono', ui-monospace, 'DejaVu Sans Mono', monospace;
  --font-sans:     'Saira', system-ui, -apple-system, 'Segoe UI', sans-serif;

  /* ---- Weights ----------------------------------------------- */
  --weight-regular:   400;
  --weight-medium:    500;
  --weight-semibold:  600;
  --weight-bold:      700;
  --weight-extrabold: 800;
  --weight-black:     900;

  /* ---- Display scale (Saira Condensed — runs big & tight) ---- */
  --text-display-2xl: 116px;
  --text-display-xl:  84px;
  --text-display-lg:  60px;
  --text-display-md:  42px;
  --text-display-sm:  30px;

  /* ---- Pixel scale (Silkscreen — keep multiples for crisp px) */
  --text-pixel-lg: 32px;
  --text-pixel-md: 20px;
  --text-pixel-sm: 14px;
  --text-pixel-xs: 10px;   /* HUD micro labels, window titles */

  /* ---- Text / body scale (Saira) ----------------------------- */
  --text-heading:  20px;
  --text-body-lg:  18px;
  --text-body:     15px;
  --text-body-sm:  13px;
  --text-caption:  12px;
  --text-micro:    11px;

  /* ---- Line heights ------------------------------------------ */
  --leading-none:    1;
  --leading-tight:   1.05;
  --leading-snug:    1.25;
  --leading-normal:  1.55;
  --leading-relaxed: 1.7;

  /* ---- Letter spacing ---------------------------------------- */
  --tracking-tighter: -0.04em;
  --tracking-tight:   -0.02em;
  --tracking-normal:  0;
  --tracking-wide:    0.04em;
  --tracking-wider:   0.10em;
  --tracking-widest:  0.20em;   /* pixel / HUD labels */
}

/* ============================================================
   pelud1n — SPACING & LAYOUT TOKENS
   4px base grid — keeps everything aligned to the rejilla.
   ============================================================ */
:root {
  --space-0:   0;
  --space-px:  1px;
  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-7:   28px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;
  --space-14:  56px;
  --space-16:  64px;
  --space-20:  80px;
  --space-24:  96px;
  --space-32:  128px;
  --space-40:  160px;

  /* ---- Layout ------------------------------------------------ */
  --container-sm:  640px;
  --container-md:  840px;
  --container-lg:  1080px;
  --container-xl:  1280px;
  --gutter:        24px;
  --section-y:     96px;   /* vertical rhythm between page sections */

  /* ---- Control sizing (height of buttons, inputs, etc.) ------ */
  --control-sm: 30px;
  --control-md: 38px;
  --control-lg: 46px;
}

/* ============================================================
   pelud1n — EFFECTS TOKENS  ·  DEDSEC-style rework
   Sharp/pixel corners, hard 1-bit shadows, dither + scanlines +
   halftone textures, glitch splits. NO neon glow (kept as no-ops).
   ============================================================ */
:root {
  /* ---- Radii — pixel/stencil: mostly square ------------------ */
  --radius-none: 0;
  --radius-sm:   1px;
  --radius-md:   2px;
  --radius-lg:   3px;
  --radius-xl:   4px;
  --radius-pill: 999px;

  /* ---- Border widths ----------------------------------------- */
  --border-hairline: 1px;
  --border-thick:    2px;
  --border-heavy:    3px;

  /* ---- Shadows — hard-edged "pixel" drops + deep ambient ----- */
  --shadow-pixel:    4px 4px 0 0 #000;
  --shadow-pixel-sm: 2px 2px 0 0 #000;
  --shadow-pixel-blood: 4px 4px 0 0 var(--blood-deep);
  --shadow-sm:    0 1px 2px rgba(0, 0, 0, 0.6);
  --shadow-md:    0 10px 28px rgba(0, 0, 0, 0.6);
  --shadow-lg:    0 22px 60px rgba(0, 0, 0, 0.72);
  --shadow-inset: inset 0 0 0 1px rgba(236, 231, 219, 0.04);

  /* ---- Glitch — channel-split offsets (replace the old glows) - */
  --glitch-text:    2px 0 var(--blood), -2px 0 var(--bone-200);
  --glitch-text-sm: 1px 0 var(--blood), -1px 0 var(--toxic);
  --glitch-box:     -3px 0 0 var(--blood-soft), 3px 0 0 var(--bruise-soft);

  /* ---- NEON GLOWS — disabled (kept so old refs don't break) --- */
  --glow-mint: 0 0 0 0 transparent;       /* @kind shadow */
  --glow-mint-sm: 0 0 0 0 transparent;    /* @kind shadow */
  --glow-violet: 0 0 0 0 transparent;     /* @kind shadow */
  --glow-red: 0 0 0 0 transparent;        /* @kind shadow */
  --glow-text-mint: none;  --glow-text-violet: none;  --glow-text-red: none;

  /* ---- Focus ring -------------------------------------------- */
  --focus-ring: 0 0 0 2px var(--color-bg), 0 0 0 4px var(--blood-bright);

  /* ---- Textures ---------------------------------------------- */

  --scanlines-soft: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 3px, rgba(0,0,0,0.18) 3px 4px); /* @kind other */
  --halftone-dots: radial-gradient(rgba(236,231,219,0.5) 0.5px, transparent 1.1px); /* @kind other */
  --halftone-size: 4px 4px;

  /* ---- The rejilla (now a faint bone grid) ------------------- */

  --grid-size: 36px;
  --grid-image:
    linear-gradient(var(--grid-line) var(--border-hairline), transparent var(--border-hairline)),
    linear-gradient(90deg, var(--grid-line) var(--border-hairline), transparent var(--border-hairline));

  /* ---- HUD corner ticks -------------------------------------- */

  --tick-weight: 2px;
  --tick-color:  var(--blood-line);

  /* ---- Motion — snappy, glitchy ------------------------------ */

  --duration-fast: 90ms;    /* @kind other */
  --duration-base: 160ms;   /* @kind other */
  --duration-slow: 320ms;   /* @kind other */
}

/* ============================================================
   pelud1n — BASE / RESET  ·  DEDSEC-style rework
   Black canvas, bone text. Opt-in helpers for the 1-bit world:
   .dither-bg .scanlines .halftone .crt .glitch  +  .pl-window chrome.
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-sans);
  font-size: var(--text-body);
  line-height: var(--leading-normal);
  font-weight: var(--weight-regular);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--color-selection); color: var(--bone-pure); }

/* Blocky scrollbar */
* { scrollbar-width: thin; scrollbar-color: var(--ink-700) transparent; }
*::-webkit-scrollbar { width: 12px; height: 12px; }
*::-webkit-scrollbar-thumb { background: var(--ink-700); border: 3px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: var(--ink-600); background-clip: content-box; }

a { color: var(--color-link); text-decoration: none; }
a:hover { color: var(--color-link-hover); }

/* ---- Font helpers ------------------------------------------ */
.pixel    { font-family: var(--font-pixel); }
.display  { font-family: var(--font-display); }
.terminal { font-family: var(--font-terminal); }
.mono     { font-family: var(--font-mono); }
.sans     { font-family: var(--font-sans); }

/* ---- Backgrounds / textures -------------------------------- */
.peludin-grid {
  background-image: var(--grid-image);
  background-size: var(--grid-size) var(--grid-size);
}
.dither-bg {
  background-color: var(--color-bg);
  background-image: var(--tex-dither);
  background-repeat: repeat;
}
.halftone {
  background-image: var(--halftone-dots);
  background-size: var(--halftone-size);
}
/* Scanline + vignette overlay — put on a positioned ::after host */
.scanlines { position: relative; }
.scanlines::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 5;
  background: var(--scanlines); mix-blend-mode: multiply;
}
.crt { position: relative; }
.crt::after {
  content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 6;
  background:
    var(--scanlines),
    radial-gradient(120% 120% at 50% 50%, transparent 60%, rgba(0,0,0,0.55) 100%);
}

/* ---- Glitch text (set data-text="..." to match content) ----- */
.glitch { position: relative; display: inline-block; }
.glitch::before, .glitch::after {
  content: attr(data-text); position: absolute; left: 0; top: 0; width: 100%;
  pointer-events: none; opacity: 0.85;
}
.glitch::before { color: var(--blood);  transform: translate(-2px, 0); clip-path: inset(0 0 52% 0); }
.glitch::after  { color: var(--toxic);  transform: translate(2px, 0);  clip-path: inset(52% 0 0 0); }
.glitch--live::before { animation: pl-glitch 2.4s var(--ease-glitch) infinite; }
.glitch--live::after  { animation: pl-glitch 2.4s var(--ease-glitch) infinite reverse; }

/* ---- Block cursor (bone by default; add .blood for red) ----- */
.pl-cursor { display: inline-block; width: 0.55em; height: 0.82em; background: var(--bone-pure);
  transform: translateY(0.06em); margin-left: 0.06em; }
.pl-cursor.blood { background: var(--blood); }
.pl-cursor.blink { animation: peludin-blink 1.05s steps(1) infinite; }

/* ---- Win9x-style window chrome ----------------------------- */
.pl-window {
  background: var(--color-surface); border: 1px solid var(--bone-200);
  box-shadow: var(--shadow-pixel); border-radius: 0;
}
.pl-window__bar {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 4px 5px 4px 8px; background: var(--blood); color: var(--bone-pure);
  font-family: var(--font-pixel); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
}
.pl-window__bar--inert { background: var(--ink-700); color: var(--bone-200); }
.pl-window__x {
  width: 16px; height: 14px; flex: 0 0 auto; display: grid; place-items: center;
  background: var(--ink-850); border: 1px solid var(--bone-300); color: var(--bone-050);
  font-family: var(--font-pixel); font-size: 9px; cursor: pointer;
}
.pl-window__body { padding: 14px; }

/* HUD corner-tick frame */
.hud-frame { position: relative; }
.hud-frame::before, .hud-frame::after {
  content: ""; position: absolute; width: var(--tick-size); height: var(--tick-size); pointer-events: none;
}
.hud-frame::before { top: var(--tick-inset); left: var(--tick-inset);
  border-top: var(--tick-weight) solid var(--tick-color); border-left: var(--tick-weight) solid var(--tick-color); }
.hud-frame::after { top: var(--tick-inset); right: var(--tick-inset);
  border-top: var(--tick-weight) solid var(--tick-color); border-right: var(--tick-weight) solid var(--tick-color); }

/* ---- Keyframes --------------------------------------------- */
@keyframes peludin-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
@keyframes pl-glitch {
  0%, 100% { transform: translate(-2px, 0); }
  20% { transform: translate(2px, -1px); }
  40% { transform: translate(-1px, 1px); }
  60% { transform: translate(3px, 0); }
  80% { transform: translate(-2px, -1px); }
}
@keyframes pl-flicker {
  0%, 100% { opacity: 1; } 92% { opacity: 1; } 93% { opacity: 0.4; } 95% { opacity: 1; } 97% { opacity: 0.7; }
}
@keyframes pl-scanroll { 0% { background-position-y: 0; } 100% { background-position-y: 100px; } }

/* peludin_site — site-specific styles (desktop / takeover metaphor) */

/* fixed dither desktop + scanline CRT overlay */
body.deskbg { background-color: var(--color-bg); }
body.deskbg::before {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: var(--tex-dither); background-repeat: repeat; opacity: .7;
}
body.deskbg::after {
  content: ""; position: fixed; inset: 0; z-index: 60; pointer-events: none;
  background: var(--scanlines); mix-blend-mode: multiply; opacity: .42;
}

/* scrolling glitch ticker */
.ticker { overflow: hidden; background: var(--blood); border-top: 1px solid var(--blood-deep); border-bottom: 1px solid var(--blood-deep); }
.ticker__run { display: inline-block; white-space: nowrap; animation: site-marquee 26s linear infinite;
  font-family: var(--font-pixel); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--bone-pure); padding: 5px 0; }
.ticker__run span { padding: 0 14px; }
.ticker__run b { color: #1a1a1a; }
@keyframes site-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* big pixel glitch wordmark */
.bigword { position: relative; display: inline-block; white-space: nowrap; font-family: var(--font-pixel);
  font-weight: 700; font-size: 60px; line-height: 1; color: var(--color-text); }
.bigword .one { color: var(--blood); }
.bigword::before, .bigword::after { content: attr(data-text); position: absolute; left: 0; top: 0; pointer-events: none; }
.bigword::before { color: var(--blood); transform: translate(-3px, 0); opacity: .7; }
.bigword::after { color: var(--toxic); transform: translate(3px, 0); opacity: .7; }
.bigword.live::before { animation: pl-glitch 2.6s steps(3, end) infinite; }
.bigword.live::after { animation: pl-glitch 2.6s steps(3, end) infinite reverse; }

/* desktop nav */
.topnav { display: flex; gap: 2px; }
.topnav a { font-family: var(--font-pixel); font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
  color: var(--color-text-secondary); padding: 8px 11px; text-decoration: none; }
.topnav a:hover { color: var(--color-text); background: var(--color-surface-hover); }
.topnav a.on { color: var(--blood-bright); }
.topnav a.on::before { content: "> "; color: var(--blood); }

/* cascade behind hero */
.cascade .cwin { position: absolute; }

/* eyebrow / section label */
.eyebrow { font-family: var(--font-pixel); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--blood-bright); }
.win-fill { width: 100%; }

@media (max-width: 880px) {
  .hero-grid { grid-template-columns: 1fr !important; }
  .stats-grid { grid-template-columns: 1fr 1fr !important; }
  .ops-grid { grid-template-columns: 1fr !important; }
  .cascade { display: none; }
  .topnav { display: none; }
  .bigword { font-size: 46px; }
}

html { scroll-behavior: smooth; }
section[id] { scroll-margin-top: 64px; }
</style>
